beeper_env_tld: beeper.com
default_provider:
  base_url: https://ai-proxy.beeper.com/v1/responses
  models:
  - id: gpt-5
    name: GPT-5
    api: openai-responses
    provider: beeper
    input:
    - text
    - image
    contextWindow: 400000
    maxTokens: 128000
default_system_prompt: You are a helpful assistant inside Beeper.
default_reasoning_level: "off"
fetch:
  timeout_ms: 10000
  max_bytes: 2097152
  max_chars: 20000
search:
  enabled: false
  endpoint: ""
  api_key: ""
stream_type: com.beeper.llm.deltas
