beeper_env_tld: beeper.com
default_provider:
  base_url: https://ai-proxy.beeper.com/v1/responses
  models:
  - id: gpt-5
    name: GPT-5
    api: openai-responses
    provider: beeper
    input:
    - text
    - image
    contextWindow: 400000
    maxTokens: 128000
room_state_event_type: com.beeper.ai.room_config
stream_type: com.beeper.llm.deltas
tools:
    enabled: false
    workspace_roots: []
