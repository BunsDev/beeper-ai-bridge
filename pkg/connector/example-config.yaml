default_provider:
  provider: openai
  api: openai-responses
  default_model: gpt-5.5
  allowed_models: []
providers:
  openrouter:
    display_name: OpenRouter
    provider: openrouter
    api: openai-completions
    base_url: https://openrouter.ai/api/v1
    api_key: env:OPENROUTER_API_KEY
    default_model: anthropic/claude-sonnet-4.5
    allowed_models:
    - anthropic/claude-sonnet-4.5
    - moonshotai/kimi-k2.6
    - openai/gpt-5.5
    enabled: false
default_system_prompt: You are a helpful assistant inside Beeper.
default_reasoning_level: "off"
fetch:
  timeout_ms: 10000
  max_bytes: 2097152
  max_chars: 20000
search:
  enabled: false
  endpoint: ""
  api_key: ""
stream_type: com.beeper.llm.deltas
